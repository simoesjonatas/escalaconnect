# nginx do Escala Connect: serve os estáticos direto e faz proxy do resto para o gunicorn.

# Preserva o protocolo original (Cloudflare manda X-Forwarded-Proto=https); cai no
# scheme local se vier vazio. Mantém o request.is_secure() correto no Django.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Estáticos coletados pelo container 'web' em /code/staticfiles (volume compartilhado).
    location /static/ {
        alias /usr/share/nginx/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Todo o resto vai para o Django/gunicorn.
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_redirect off;
    }
}
