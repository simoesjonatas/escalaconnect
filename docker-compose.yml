services:
  web:
    container_name: escalaconnect
    hostname: escalaconnect
    restart: always
    build: .
    # Produção: aplica migrações, coleta estáticos (servidos pelo WhiteNoise) e sobe o gunicorn.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn escalaconnect.wsgi:application
             --bind 0.0.0.0:8000 --workers 3 --timeout 120
             --access-logfile - --error-logfile -"
    ports:
      - "8095:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: escalaconnect.settings
      # Aponta o Celery para o serviço redis deste compose (sobrepõe o .env).
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  celeryworker:
    container_name: escalaconnect-celery
    build: .
    restart: always
    command: celery -A escalaconnect worker -l INFO
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: escalaconnect.settings
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

  # Opcional: Celery Beat (tarefas periódicas)
  # celerybeat:
  #   container_name: escalaconnect-beat
  #   build: .
  #   restart: always
  #   command: celery -A escalaconnect beat -l INFO
  #   env_file:
  #     - .env
  #   environment:
  #     DJANGO_SETTINGS_MODULE: escalaconnect.settings
  #     CELERY_BROKER_URL: redis://redis:6379/0
  #     CELERY_RESULT_BACKEND: redis://redis:6379/1
  #   depends_on:
  #     redis:
  #       condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: escalaconnect-redis
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
