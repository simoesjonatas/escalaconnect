services:
  web:
    container_name: escalaconnect
    hostname: escalaconnect
    restart: always
    build: .
    # Produção: migra, coleta estáticos e sobe o gunicorn (em entrypoint.sh,
    # para evitar o YAML quebrar os argumentos do gunicorn em várias linhas).
    command: sh /code/entrypoint.sh
    # Sem porta pública: quem expõe é o nginx. Continua acessível pelo nome 'web' na rede.
    expose:
      - "8000"
    volumes:
      # Compartilha os estáticos coletados com o nginx.
      - static_volume:/code/staticfiles
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: escalaconnect.settings
      DATABASE_ENGINE: postgres
      CSRF_TRUSTED_ORIGINS: http://localhost:8095,http://127.0.0.1:8095
      # Aponta o Celery para o serviço redis deste compose (sobrepõe o .env).
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "False"
      CELERY_TASK_EAGER_PROPAGATES: "True"
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: escalaconnect-nginx
    restart: always
    ports:
      - "8095:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/static:ro
    depends_on:
      - web

  celeryworker:
    container_name: escalaconnect-celery
    build: .
    restart: always
    command: celery -A escalaconnect worker -l INFO
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: escalaconnect.settings
      DATABASE_ENGINE: postgres
      CSRF_TRUSTED_ORIGINS: http://localhost:8095,http://127.0.0.1:8095
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "False"
      CELERY_TASK_EAGER_PROPAGATES: "True"
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

  # Opcional: Celery Beat (tarefas periódicas)
  # celerybeat:
  #   container_name: escalaconnect-beat
  #   build: .
  #   restart: always
  #   command: celery -A escalaconnect beat -l INFO
  #   env_file:
  #     - .env
  #   environment:
  #     DJANGO_SETTINGS_MODULE: escalaconnect.settings
  #     CELERY_BROKER_URL: redis://redis:6379/0
  #     CELERY_RESULT_BACKEND: redis://redis:6379/1
  #   depends_on:
  #     redis:
  #       condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: escalaconnect-redis
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  static_volume:
